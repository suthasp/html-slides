<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="zg" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%"   stop-color="#e040fb"/>
      <stop offset="45%"  stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#13103a"/>
  <!-- Z shape -->
  <polyline
    points="17,21 83,21 17,79 83,79"
    stroke="url(#zg)"
    stroke-width="7.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"/>
  <!-- Corner dots -->
  <circle cx="17" cy="21" r="5.5" fill="#e040fb" filter="url(#glow)"/>
  <circle cx="83" cy="21" r="4"   fill="#b060f0"/>
  <circle cx="17" cy="79" r="4"   fill="#40a0ff"/>
  <circle cx="83" cy="79" r="5.5" fill="#00e5ff" filter="url(#glow)"/>
</svg>
